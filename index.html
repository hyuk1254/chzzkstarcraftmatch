<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스진동 - 치지직 스타크래프트 동아리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
    
    .dash-card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
    }
    .dash-card:hover { border-color: rgba(16, 185, 129, 0.3); }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0b0f19; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

    .race-terran-text { color: #60a5fa !important; }
    .race-protoss-text { color: #f59e0b !important; }
    .race-zerg-text { color: #ef4444 !important; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900/90 border-r border-slate-800/80 flex flex-col justify-between hidden md:flex z-20">
    <div>
      <div class="h-20 flex items-center px-6 gap-3 border-b border-slate-800/60">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-300 flex items-center justify-center font-black text-slate-950 text-xl shadow-lg shadow-emerald-500/20">S</div>
        <div>
          <h1 class="font-extrabold text-lg text-white tracking-wider">스진동</h1>
          <p class="text-[10px] text-emerald-400 font-medium tracking-tight">CHZZK SC CLUB</p>
        </div>
      </div>

      <nav class="p-4 space-y-1.5">
        <button onclick="switchTab('main')" id="nav-main" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 transition">
          <i class="fa-solid fa-chart-pie w-5"></i> 메인 대시보드
        </button>
        <button onclick="switchTab('members')" id="nav-members" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition">
          <i class="fa-solid fa-users w-5"></i> 동아리 소개
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition">
          <i class="fa-solid fa-gamepad w-5"></i> 컨텐츠 기록
        </button>
        <button onclick="switchTab('calendar')" id="nav-calendar" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition">
          <i class="fa-solid fa-calendar-days w-5"></i> 동아리 스케줄
        </button>
      </nav>
    </div>

    <div class="p-4 border-t border-slate-800/60 text-xs text-slate-500 flex items-center justify-between">
      <span>DB Sync: <strong class="text-emerald-400">Live</strong></span>
      <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
    </div>
  </aside>

  <!-- MAIN VIEW -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-20 border-b border-slate-800/60 bg-slate-900/40 backdrop-blur-md px-6 flex items-center justify-between z-10">
      <h2 id="page-title" class="text-xl font-bold text-white">메인 대시보드</h2>
      
      <div class="flex items-center gap-3">
        <button onclick="manualRefreshLive()" id="refresh-btn" class="px-3.5 py-1.5 rounded-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-medium flex items-center gap-2 transition shadow">
          <i class="fa-solid fa-rotate-right" id="refresh-icon"></i> 라이브 새로고침
        </button>
        <span class="text-xs px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-slate-300 font-medium hidden sm:flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-emerald-400"></span> API 연동 정상
        </span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 space-y-8">

      <!-- BANNER HERO -->
      <div id="hero-banner" class="w-full dash-card p-4 sm:p-6 rounded-2xl flex items-center justify-center overflow-hidden">
        <img src="https://cdn.discordapp.com/attachments/1503357186917797978/1528363789991280702/20251231.png?ex=6a600173&is=6a5eaff3&hm=5f5a3dc2f42984b1f5394ba24f832afee82e41418020230878f38ab357e85da9&" 
             alt="스진동 메인 타이틀" class="w-full max-w-4xl h-auto object-contain filter drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
      </div>

      <!-- TAB 1: MAIN -->
      <div id="tab-main" class="tab-content space-y-8">
        <div class="space-y-4">
          <h3 class="text-lg font-bold text-white flex items-center justify-between">
            <span class="flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500 animate-ping"></span> 치지직 라이브 방송 현황
            </span>
            <span id="last-sync-time" class="text-[11px] text-slate-500 font-normal"></span>
          </h3>
          <div id="live-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="col-span-full dash-card p-8 text-center text-slate-400 rounded-2xl">방송 데이터를 확인하는 중입니다...</div>
          </div>
        </div>

        <div class="space-y-4">
          <h3 class="text-lg font-bold text-white"><i class="fa-regular fa-clock text-emerald-400 mr-2"></i>이번 주 일정표</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-7 gap-3" id="weekly-widget"></div>
        </div>
      </div>

      <!-- TAB 2: MEMBERS -->
      <div id="tab-members" class="tab-content hidden space-y-8">
        <div class="dash-card p-6 rounded-2xl border-l-4 border-l-emerald-500">
          <h3 class="text-xl font-bold text-white mb-2">동아리 소개</h3>
          <p class="text-sm text-slate-300 leading-relaxed">
            치지직 스타크래프트 스트리머 동아리 <strong class="text-emerald-400">스진동</strong> 대시보드입니다.
          </p>
        </div>
        <div id="members-grouped-container" class="space-y-8"></div>
      </div>

      <!-- TAB 3: HISTORY -->
      <div id="tab-history" class="tab-content hidden space-y-8">
        <div class="flex flex-wrap gap-2 pb-2 border-b border-slate-800">
          <button onclick="filterHistory('all')" id="hist-btn-all" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-emerald-500 text-slate-950 transition">전체 보기</button>
          <button onclick="filterHistory('정기모임')" id="hist-btn-정기모임" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition">📅 정기모임</button>
          <button onclick="filterHistory('종족최강전')" id="hist-btn-종족최강전" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition">⚔️ 종족최강전</button>
          <button onclick="filterHistory('교체혈전')" id="hist-btn-교체혈전" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition">🔥 교체혈전</button>
          <button onclick="filterHistory('종합게임')" id="hist-btn-종합게임" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition">🎮 종합게임</button>
          <button onclick="filterHistory('기타')" id="hist-btn-기타" class="hist-filter-btn px-4 py-2 rounded-xl text-xs font-bold bg-slate-800 text-slate-300 hover:bg-slate-700 transition">✨ 기타</button>
        </div>

        <div id="container-history" class="space-y-4"></div>
      </div>

      <!-- TAB 4: CALENDAR -->
      <div id="tab-calendar" class="tab-content hidden space-y-4">
        <div class="dash-card p-6 rounded-2xl space-y-4">
          <div class="flex items-center justify-between">
            <h3 id="cal-month-title" class="text-xl font-bold text-white">2026년 8월</h3>
            <div class="flex gap-2">
              <button onclick="changeMonth(-1)" class="px-3 py-1.5 bg-slate-800 text-xs rounded-lg hover:bg-slate-700 border border-slate-700">이전달</button>
              <button onclick="changeMonth(1)" class="px-3 py-1.5 bg-slate-800 text-xs rounded-lg hover:bg-slate-700 border border-slate-700">다음달</button>
            </div>
          </div>
          <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-slate-400 pb-2 border-b border-slate-800">
            <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
          </div>
          <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const SPREADSHEET_ID = "1mBhZxpmt7xw8fC37cRjSaVQBSQkPXdskJNK9u1Zg_Co";
    
    const RACE_ICONS = {
      terran: "https://cdn.discordapp.com/attachments/1528721011732643951/1528793445269770421/qtPQWR_1fiy6ly6NbndO9Sp-CA73mBjJ52ZtZGwQj1Ozo9FlQOeTV5pjtS3UKrA-_4qCiNLGr3_rgpklZ1HSJCk-0kw5lxqO-VCVHEvGo6jDv60hOCVhzX4Kcun7dxbwK73isQF0cBHi3qjeHDct5w.webp?ex=6a5f9758&is=6a5e45d8&hm=e3199aaefab4395ddca0983c8738bee5bf7c491b6ff3c456a437ce3d9913ad5f&",
      zerg: "https://cdn.discordapp.com/attachments/1528721011732643951/1528793444846403715/vkWLywILixMzHkg83QumKeJR3YPhDMGdAZtjbJ2SBLPOQCHgpqcbXRCRyudHo-3nP5AYQEkKIJFncVwYoOjG4AHdeJ-dcwc1uwhiR90LsKIfDy6If7-s5EhI2xI59o0Vkchd9PNFAOFM_CQamYXFXQ.webp?ex=6a5f9758&is=6a5e45d8&hm=dd0ba630755f7d54b893c5e17412f56f4dcea5c06e69d6f970aaa4dfdacd4c3f&",
      protoss: "https://cdn.discordapp.com/attachments/1528721011732643951/1528793444435099648/WrK9L73w0c_CY7HVAOuXzdRg4yS7OBrMXtBIs1qEGHnPZPTeH7N8t1Mzb8sIRkcSkLSi0v47wBiONdp35r10WIE-tmRf8d4EN2gUaMBVgOR0OYFJj_kPILzCITBFwL6SMK05jX0r1pnJiNIp2t5PjQ.webp?ex=6a5f9758&is=6a5e45d8&hm=63492a3a94779f80643e3c3f5a1f546e5df60b4da678e33ae2b9e260b58b76c2&"
    };

    let db = { members: [], schedules: [], historyMatch: [], historyMulti: [], details: [] };
    let currentCategoryFilter = 'all';
    let currentCalDate = new Date();

    window.addEventListener('DOMContentLoaded', () => {
      loadData();
      setInterval(() => {
        if (db.members.length > 0) {
          checkChzzkLive();
        }
      }, 60000);
    });

    async function loadData() {
      const fetchCSV = (sheet) => new Promise(res => {
        Papa.parse(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheet}`, {
          download: true, header: true, skipEmptyLines: true, complete: r => res(r.data)
        });
      });

      try {
        db.members = await fetchCSV('MEMBERS');
        db.schedules = await fetchCSV('Schedules');
        db.historyMatch = await fetchCSV('Contents_History');
        db.historyMulti = await fetchCSV('History_MultiGame');
        db.details = await fetchCSV('Match_Details');

        renderMembers();
        renderWeeklyWidget();
        renderAllHistory();
        renderCalendar();
        checkChzzkLive();
      } catch (e) { console.error("Data Load Error:", e); }
    }

    async function manualRefreshLive() {
      const icon = document.getElementById('refresh-icon');
      icon.classList.add('fa-spin');
      await checkChzzkLive();
      setTimeout(() => {
        icon.classList.remove('fa-spin');
      }, 600);
    }

    function getRaceIconOnly(text, explicitRace) {
      const raceStr = String(explicitRace || text || '').toLowerCase();
      if (raceStr.includes('테란') || raceStr.includes('terran') || raceStr === 't') return RACE_ICONS.terran;
      if (raceStr.includes('프로토스') || raceStr.includes('토스') || raceStr.includes('protoss') || raceStr === 'p') return RACE_ICONS.protoss;
      if (raceStr.includes('저그') || raceStr.includes('zerg') || raceStr === 'z') return RACE_ICONS.zerg;

      const matchedMember = db.members.find(m => (m.name || m.이름 || '').trim() === String(text).trim());
      if (matchedMember) {
        const race = (matchedMember.race || matchedMember.종족 || '').trim();
        if (race === '테란') return RACE_ICONS.terran;
        if (race === '프로토스') return RACE_ICONS.protoss;
        if (race === '저그') return RACE_ICONS.zerg;
      }
      return '';
    }

    function convertMemberNameToLink(text) {
      if (!text) return '';
      let resultText = String(text);

      db.members.forEach(m => {
        const name = (m.name || m.이름 || '').trim();
        const chzzkId = (m.chzzk_id || m.channel_id || (m.방송국링크 ? m.방송국링크.split('/').pop() : '') || '').trim();

        if (name && chzzkId && resultText.includes(name)) {
          const linkHTML = `<a href="https://chzzk.naver.com/${chzzkId}" target="_blank" class="inline-flex items-center gap-1 font-bold text-emerald-400 hover:text-emerald-300 hover:underline bg-emerald-950/80 px-1.5 py-0.5 rounded border border-emerald-800/80 my-0.5" onclick="event.stopPropagation();"><i class="fa-solid fa-tv text-[10px]"></i> ${name}</a>`;
          const regExp = new RegExp(name, 'g');
          resultText = resultText.replace(regExp, linkHTML);
        }
      });

      return resultText;
    }

    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('bg-emerald-500/10', 'text-emerald-400', 'border', 'border-emerald-500/20');
        b.classList.add('text-slate-400');
      });

      document.getElementById(`tab-${id}`).classList.remove('hidden');
      const activeNav = document.getElementById(`nav-${id}`);
      if (activeNav) {
        activeNav.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border', 'border-emerald-500/20');
      }
      
      const heroBanner = document.getElementById('hero-banner');
      if (id === 'main') {
        heroBanner.classList.remove('hidden');
      } else {
        heroBanner.classList.add('hidden');
      }

      const titles = { main: '메인 대시보드', members: '동아리 소개', history: '컨텐츠 기록', calendar: '동아리 스케줄' };
      document.getElementById('page-title').innerText = titles[id] || '스진동';
    }

    function renderMembers() {
      const container = document.getElementById('members-grouped-container');
      container.innerHTML = '';

      const races = [
        { name: '프로토스', color: 'race-protoss-text', border: 'border-amber-500/50', badgeBg: 'bg-amber-500/10 text-amber-400 border-amber-500/30', icon: RACE_ICONS.protoss },
        { name: '테란', color: 'race-terran-text', border: 'border-blue-500/50', badgeBg: 'bg-blue-500/10 text-blue-400 border-blue-500/30', icon: RACE_ICONS.terran },
        { name: '저그', color: 'race-zerg-text', border: 'border-red-500/50', badgeBg: 'bg-red-500/10 text-red-400 border-red-500/30', icon: RACE_ICONS.zerg }
      ];

      races.forEach(r => {
        const matchedMembers = db.members.filter(m => (m.race || m.종족 || '').trim() === r.name);
        if (matchedMembers.length === 0) return;

        let memberCardsHTML = matchedMembers.map(m => {
          const name = (m.name || m.이름 || '').trim();
          const chzzkId = (m.chzzk_id || m.channel_id || (m.방송국링크 ? m.방송국링크.split('/').pop() : '') || '').trim();

          let roleBadgeHTML = '';
          if (name === '망시') {
            roleBadgeHTML = `<span class="text-[11px] px-2.5 py-0.5 rounded-full bg-amber-500/20 text-amber-300 border border-amber-500/40 font-black">👑 동아리장</span>`;
          } else if (name === '엄크술사') {
            roleBadgeHTML = `<span class="text-[11px] px-2.5 py-0.5 rounded-full bg-emerald-500/20 text-emerald-300 border border-emerald-500/40 font-black">🛠️ 매니저</span>`;
          }

          return `
            <div class="dash-card p-5 rounded-2xl flex flex-col justify-between hover:scale-[1.02] transition duration-200">
              <div>
                <div class="flex items-start justify-between mb-3">
                  <img src="${m.profile_img || m.프로필사진 || 'https://via.placeholder.com/80'}" class="w-16 h-16 rounded-2xl object-cover border-2 ${r.border} shadow-lg">
                  <span class="text-xs px-2.5 py-1 rounded-full border ${r.badgeBg} font-bold flex items-center gap-1.5">
                    <img src="${r.icon}" class="w-4 h-4 object-contain"> ${r.name}
                  </span>
                </div>
                <div class="space-y-1 mb-4">
                  <div class="flex items-center gap-2 flex-wrap">
                    <h4 class="font-bold text-lg text-white">${name}</h4>
                    ${roleBadgeHTML}
                  </div>
                </div>
              </div>

              <a href="https://chzzk.naver.com/${chzzkId}" target="_blank" 
                 class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition">
                <i class="fa-solid fa-tv text-sm"></i> 치지직 방송국 방문
              </a>
            </div>
          `;
        }).join('');

        container.innerHTML += `
          <div class="space-y-4">
            <h3 class="text-lg font-bold text-white flex items-center gap-2 border-b border-slate-800 pb-2">
              <img src="${r.icon}" class="w-6 h-6 object-contain">
              <span class="${r.color}">${r.name}</span> (${matchedMembers.length}명)
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              ${memberCardsHTML}
            </div>
          </div>
        `;
      });
    }

    async function checkChzzkLive() {
      const grid = document.getElementById('live-grid');
      let liveCount = 0;

      grid.innerHTML = `<div class="col-span-full dash-card p-6 text-center text-slate-400 rounded-2xl border border-slate-800 text-xs animate-pulse">라이브 방송을 검색 중입니다...</div>`;

      let tempHTML = '';

      for (let m of db.members) {
        let chzzkId = (m.chzzk_id || m.channel_id || m.chzzkId || (m.방송국링크 ? m.방송국링크.split('/').pop() : '') || '').trim();
        if (chzzkId.includes('/')) {
          chzzkId = chzzkId.split('/').pop().split('?')[0];
        }

        const name = (m.name || m.이름 || '').trim();
        const profileImg = m.profile_img || m.프로필사진 || 'https://via.placeholder.com/80';
        if (!chzzkId) continue;

        const timestamp = new Date().getTime();
        const targetApi = `https://api.chzzk.naver.com/service/v1/channels/${chzzkId}/live-detail?_t=${timestamp}`;

        const proxyCandidates = [
          `https://api.allorigins.win/get?url=${encodeURIComponent(targetApi)}`,
          `https://corsproxy.io/?${encodeURIComponent(targetApi)}`
        ];

        let liveData = null;

        for (let proxyUrl of proxyCandidates) {
          try {
            const res = await fetch(proxyUrl);
            const resJson = await res.json();
            
            let parsed = resJson.contents ? JSON.parse(resJson.contents) : resJson;
            if (parsed && parsed.content) {
              liveData = parsed.content;
              break;
            }
          } catch (e) {
            continue;
          }
        }

        if (liveData && liveData.status === 'OPEN') {
          liveCount++;
          const liveTitle = liveData.liveTitle || '라이브 방송 중';

          tempHTML += `
            <div class="dash-card p-5 rounded-2xl border-l-4 border-l-red-500 flex flex-col justify-between hover:border-red-400 transition shadow-lg">
              <div>
                <div class="flex items-center justify-between mb-3">
                  <div class="flex items-center gap-3">
                    <img src="${profileImg}" class="w-10 h-10 rounded-xl object-cover border border-slate-700">
                    <div>
                      <span class="font-bold text-white text-sm block">${name}</span>
                      <span class="text-[10px] text-emerald-400 font-medium">CHZZK STREAMER</span>
                    </div>
                  </div>
                  <span class="bg-red-500 text-white text-[10px] font-black px-2.5 py-0.5 rounded-full animate-pulse flex items-center gap-1 shadow-sm shadow-red-500/50">
                    <span class="w-1.5 h-1.5 rounded-full bg-white"></span> LIVE
                  </span>
                </div>

                <p class="text-xs text-slate-200 font-semibold truncate my-2 bg-slate-900/60 p-2.5 rounded-xl border border-slate-800/80" title="${liveTitle}">
                  <i class="fa-solid fa-satellite-dish text-red-400 mr-1.5"></i>${liveTitle}
                </p>
              </div>

              <a href="https://chzzk.naver.com/live/${chzzkId}" target="_blank" 
                 class="w-full mt-2 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-xs rounded-xl text-center flex items-center justify-center gap-1.5 transition">
                <i class="fa-solid fa-play text-[10px]"></i> 라이브 방송 시청하기
              </a>
            </div>
          `;
        }
      }

      const nowTime = new Date().toLocaleTimeString();
      const syncText = document.getElementById('last-sync-time');
      if(syncText) syncText.innerText = `마지막 갱신: ${nowTime}`;

      if (liveCount > 0) {
        grid.innerHTML = tempHTML;
      } else {
        grid.innerHTML = `
          <div class="col-span-full dash-card p-8 text-center text-slate-400 rounded-2xl border border-slate-800">
            <i class="fa-solid fa-headset text-2xl text-slate-600 mb-2 block"></i>
            현재 라이브 방송 중인 멤버가 없습니다.
          </div>
        `;
      }
    }

    // 💡 '참여:' 글씨 제거 및 컨텐츠 바로 아래 명단이 오도록 정렬 개편된 주간 일정 위젯
    function renderWeeklyWidget() {
      const widget = document.getElementById('weekly-widget');
      widget.innerHTML = '';
      const days = ['월', '화', '수', '목', '금', '토', '일'];

      const now = new Date();
      const currentDayIndex = now.getDay();
      const distanceToMonday = (currentDayIndex === 0 ? -6 : 1 - currentDayIndex);
      
      const monday = new Date(now);
      monday.setDate(now.getDate() + distanceToMonday);
      monday.setHours(0, 0, 0, 0);

      days.forEach((d, idx) => {
        const dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + idx);

        const targetY = dayDate.getFullYear();
        const targetM = dayDate.getMonth() + 1;
        const targetD = dayDate.getDate();

        const matches = db.schedules.filter(s => {
          const rawDate = String(s.date || s.날짜 || '').trim();
          if (!rawDate) return false;

          const clean = rawDate.replace(/\s+/g, '');
          const parts = clean.split(/[-.\/]/).filter(p => p !== '');

          if (parts.length >= 3) {
            const parsedY = parseInt(parts[0], 10);
            const parsedM = parseInt(parts[1], 10);
            const parsedD = parseInt(parts[2], 10);

            if (parsedY === targetY && parsedM === targetM && parsedD === targetD) {
              return true;
            }
          }
          return false;
        });

        let eventsHTML = matches.map(m => {
          const originalTitle = m.title || m.일정내용 || m.내용 || '';
          const linkedTitle = convertMemberNameToLink(originalTitle);
          const timeVal = m.time || m.시간 || '';
          const scheduleMember = (m.member || m.참여멤버 || '').trim();
          const linkedScheduleMember = convertMemberNameToLink(scheduleMember);

          return `
            <div class="bg-slate-800/80 p-2.5 rounded-lg text-xs border border-slate-700/80 text-slate-200 space-y-1.5">
              <div class="flex justify-between items-center">
                <strong class="text-emerald-400"><i class="fa-regular fa-clock text-[10px]"></i> ${timeVal || '시간미정'}</strong>
              </div>
              <div class="font-bold text-white">${linkedTitle}</div>
              ${linkedScheduleMember ? `<div class="text-[11px] text-slate-300 pt-1 border-t border-slate-700/60">${linkedScheduleMember}</div>` : ''}
            </div>
          `;
        }).join('');

        if(!eventsHTML) eventsHTML = `<span class="text-xs text-slate-600 block text-center py-2">일정 없음</span>`;

        widget.innerHTML += `
          <div class="dash-card p-3 rounded-xl flex flex-col gap-2 min-h-[120px]">
            <div class="text-center pb-1.5 border-b border-slate-800">
              <span class="font-bold text-emerald-400 text-xs">${d}요일</span>
              <span class="text-[10px] text-slate-500 block">${targetM}/${targetD}</span>
            </div>
            <div class="space-y-1.5 flex-1">${eventsHTML}</div>
          </div>
        `;
      });
    }

    function renderAllHistory() {
      const container = document.getElementById('container-history');
      container.innerHTML = '';

      let matchCardsHTML = db.historyMatch.map(h => {
        const cat = String(h.category || h.카테고리 || '').trim();
        if (currentCategoryFilter !== 'all' && cat !== currentCategoryFilter) return '';

        const matchId = String(h.match_id || h.매치구분 || h.ID || '').trim();
        if (!matchId) return '';

        const sets = db.details.filter(d => String(d.match_id || d.매치구분 || d.ID || '').trim().toLowerCase() === matchId.toLowerCase());
        
        let p1 = h.p1_name || h.p1 || h.팀1 || h.팀1명 || '팀 A';
        let p2 = h.p2_name || h.p2 || h.팀2 || h.팀2명 || '팀 B';
        
        let p1Icon = getRaceIconOnly(p1, h.p1_race);
        let p2Icon = getRaceIconOnly(p2, h.p2_race);

        let rawS1 = h.p1_score !== undefined && h.p1_score !== '' ? h.p1_score : (h.p1점수 !== undefined ? h.p1점수 : null);
        let rawS2 = h.p2_score !== undefined && h.p2_score !== '' ? h.p2_score : (h.p2점수 !== undefined ? h.p2점수 : null);

        const hasScore = rawS1 !== null && rawS2 !== null && rawS1 !== '' && rawS2 !== '' && !isNaN(parseInt(rawS1)) && !isNaN(parseInt(rawS2));

        let scoreHTML = '';
        if (hasScore) {
          let s1 = parseInt(String(rawS1).trim(), 10) || 0;
          let s2 = parseInt(String(rawS2).trim(), 10) || 0;
          let isP1Win = s1 > s2;
          let isP2Win = s2 > s1;

          scoreHTML = `
            <div class="bg-slate-900/90 p-4 rounded-xl border border-slate-800 flex items-center justify-between text-sm sm:text-base font-bold">
              <div class="flex-1 text-right truncate pr-4 text-white flex items-center justify-end gap-2">
                ${p1Icon ? `<img src="${p1Icon}" class="w-4 h-4 object-contain">` : ''} 
                <span class="truncate">${p1}</span>
              </div>
              
              <div class="px-5 py-1.5 bg-slate-800/90 rounded-xl border border-slate-700 text-white tracking-widest text-lg shadow-inner">
                <span class="${isP1Win ? 'text-emerald-400 font-black' : ''}">${s1}</span> 
                <span class="text-slate-500 mx-1">:</span> 
                <span class="${isP2Win ? 'text-emerald-400 font-black' : ''}">${s2}</span>
              </div>

              <div class="flex-1 text-left truncate pl-4 text-white flex items-center justify-start gap-2">
                <span class="truncate">${p2}</span>
                ${p2Icon ? `<img src="${p2Icon}" class="w-4 h-4 object-contain">` : ''}
              </div>
            </div>
          `;
        }

        let setsList = sets.map((s, i) => {
          const setNum = s.set_num || s.세트번호 || (i + 1);
          const sP1 = (s.p1 || s.선수1 || s.p1_name || '').trim();
          const sP2 = (s.p2_name || s.p2 || s.선수2 || '').trim();
          const sP1Race = (s.p1_race || s.p1종족 || '').trim();
          const sP2Race = (s.p2_race || (s.p2 !== sP2 ? s.p2 : '') || '').trim();
          const winner = (s.winner || s.승리선수 || s.승자 || '').trim();
          const sP1Icon = getRaceIconOnly(sP1, sP1Race);
          const sP2Icon = getRaceIconOnly(sP2, sP2Race);
          const isP1Winner = winner && (sP1.includes(winner) || winner.includes(sP1));
          const isP2Winner = winner && (sP2.includes(winner) || winner.includes(sP2));

          return `
            <div class="flex justify-between items-center py-2 border-b border-slate-800/80 text-xs">
              <span class="text-slate-400 font-medium w-28">${setNum}세트 <span class="text-slate-500 text-[11px]">(${s.map || s.맵 || '투혼'})</span></span>
              
              <div class="flex-1 flex items-center justify-center gap-3">
                <span class="text-white font-bold flex items-center gap-1 ${isP1Winner ? 'scale-105' : 'opacity-60'}">
                  ${sP1Icon ? `<img src="${sP1Icon}" class="w-3.5 h-3.5 object-contain">` : ''}
                  ${sP1 || '선수 미입력'}
                  ${isP1Winner ? `<span class="text-amber-400 text-[11px] ml-0.5">👑</span>` : ''}
                </span>

                <span class="text-slate-600 text-[10px] font-bold">VS</span>

                <span class="text-white font-bold flex items-center gap-1 ${isP2Winner ? 'scale-105' : 'opacity-60'}">
                  ${isP2Winner ? `<span class="text-amber-400 text-[11px] mr-0.5">👑</span>` : ''}
                  ${sP2 || '선수 미입력'}
                  ${sP2Icon ? `<img src="${sP2Icon}" class="w-3.5 h-3.5 object-contain">` : ''}
                </span>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="dash-card p-6 rounded-2xl space-y-4">
            <div class="flex justify-between items-center text-xs text-slate-400">
              <span class="px-2.5 py-1 rounded-full bg-slate-800 border border-slate-700 text-emerald-400 font-bold">${cat || '정기모임'}</span>
              <span>${h.date || h.날짜 || ''}</span>
            </div>
            <h4 class="text-base font-bold text-white">${h.title || h.제목 || '모임 결과'}</h4>
            ${scoreHTML}
            ${sets.length > 0 ? `
              <details class="group">
                <summary class="text-xs text-slate-400 cursor-pointer hover:text-emerald-400 font-medium">▶ 세부 라운드 스코어 열기 (${sets.length}개 세트)</summary>
                <div class="mt-3 p-3 bg-slate-950/50 rounded-xl border border-slate-800/60">${setsList}</div>
              </details>
            ` : ''}
          </div>
        `;
      }).join('');

      let multiCardsHTML = db.historyMulti.map(g => {
        const cat = String(g.category || g.카테고리 || '종합게임').trim();
        if (currentCategoryFilter !== 'all' && cat !== currentCategoryFilter) return '';

        const title = g.title || g.제목 || '';
        const date = g.date || g.날짜 || '';
        const titleImg = g.title_img || g.대표이미지 || '';
        const description = g.description || g.설명 || '';
        const rawMembers = g.member || g.참여멤버 || '';
        const linkedMembers = convertMemberNameToLink(rawMembers);

        return `
          <div class="dash-card p-6 rounded-2xl space-y-4">
            <div class="flex justify-between items-center text-xs text-slate-400">
              <span class="px-2.5 py-1 rounded-full bg-purple-950 border border-purple-800 text-purple-400 font-bold">${cat}</span>
              <span>${date}</span>
            </div>

            <h4 class="text-base font-bold text-white">${title}</h4>

            ${titleImg ? `<img src="${titleImg}" class="w-full h-48 object-cover rounded-xl border border-slate-800 shadow">` : ''}

            ${description ? `
              <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800 text-xs text-slate-200 leading-relaxed">
                <i class="fa-solid fa-gamepad text-purple-400 mr-2"></i>${description}
              </div>
            ` : ''}

            ${linkedMembers ? `
              <div class="text-xs text-slate-400 pt-2 border-t border-slate-800/80 space-y-1">
                <strong class="text-slate-300 block mb-1">참여 멤버</strong>
                <div class="flex flex-wrap gap-1">${linkedMembers}</div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      const combinedHTML = matchCardsHTML + multiCardsHTML;

      if (!combinedHTML.trim()) {
        container.innerHTML = `<div class="dash-card p-8 text-center text-slate-400 rounded-2xl border border-slate-800 text-xs">해당 카테고리의 컨텐츠 기록이 없습니다.</div>`;
      } else {
        container.innerHTML = combinedHTML;
      }
    }

    function filterHistory(category) {
      currentCategoryFilter = category;

      document.querySelectorAll('.hist-filter-btn').forEach(btn => {
        btn.classList.remove('bg-emerald-500', 'text-slate-950');
        btn.classList.add('bg-slate-800', 'text-slate-300');
      });

      const activeBtn = document.getElementById(`hist-btn-${category}`);
      if(activeBtn) {
        activeBtn.classList.add('bg-emerald-500', 'text-slate-950');
      }

      renderAllHistory();
    }

    // 💡 캘린더 일정 카드에서도 '참여:' 글씨 제거 및 명단이 바로 이어지도록 정렬 반영
    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      const year = currentCalDate.getFullYear();
      const month = currentCalDate.getMonth();
      document.getElementById('cal-month-title').innerText = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for(let i=0; i<firstDay; i++) {
        grid.innerHTML += `<div class="h-20 bg-slate-950/30 rounded-xl"></div>`;
      }

      for(let date=1; date<=lastDate; date++) {
        const events = db.schedules.filter(s => {
          const rawDate = String(s.date || s.날짜 || '').trim();
          if (!rawDate) return false;

          const clean = rawDate.replace(/\s+/g, '');
          const parts = clean.split(/[-.\/]/).filter(p => p !== '');
          if (parts.length >= 3) {
            const parsedY = parseInt(parts[0], 10);
            const parsedM = parseInt(parts[1], 10);
            const parsedD = parseInt(parts[2], 10);
            if (parsedY === year && parsedM === (month + 1) && parsedD === date) return true;
          }

          return false;
        });

        let eventBadges = events.map(e => {
          const originalTitle = e.title || e.일정내용 || e.내용 || '';
          const linkedTitle = convertMemberNameToLink(originalTitle);
          const timeVal = e.time || e.시간 || '';
          const scheduleMember = (e.member || e.참여멤버 || '').trim();
          const linkedScheduleMember = convertMemberNameToLink(scheduleMember);

          return `
            <div class="bg-emerald-500/10 text-emerald-300 border border-emerald-500/20 text-[10px] p-1.5 rounded-md mt-1 leading-relaxed space-y-0.5">
              ${timeVal ? `<strong class="text-emerald-400 block font-bold">${timeVal}</strong>` : ''}
              <div>${linkedTitle}</div>
              ${linkedScheduleMember ? `<div class="text-[9px] text-slate-300 pt-0.5 border-t border-slate-700/50">${linkedScheduleMember}</div>` : ''}
            </div>
          `;
        }).join('');

        grid.innerHTML += `
          <div class="h-28 bg-slate-900/60 p-2 rounded-xl border border-slate-800/60 flex flex-col justify-between overflow-hidden">
            <span class="text-xs font-bold text-slate-400">${date}</span>
            <div class="overflow-y-auto flex-1">${eventBadges}</div>
          </div>
        `;
      }
    }

    function changeMonth(d) {
      currentCalDate.setMonth(currentCalDate.getMonth() + d);
      renderCalendar();
    }
  </script>
</body>
</html>
